<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App with Real-time Score</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .score-board {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 600;
        }
        .progress-bar {
            height: 8px;
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }
        .progress-fill {
            height: 100%;
            background: #fff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }
        .quiz-content {
            padding: 40px 30px;
        }
        .question {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .question-number {
            background: #4facfe;
            color: white;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            display: inline-block;
            margin-bottom: 15px;
        }
        .options {
            display: grid;
            gap: 15px;
        }
        .option {
            padding: 18px 22px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 16px;
            font-weight: 500;
        }
        .option:hover {
            border-color: #4facfe;
            background: #f0f8ff;
            transform: translateY(-2px);
        }
        .option.selected {
            background: #4facfe;
            color: white;
            border-color: #4facfe;
        }
        .option.correct {
            background: #28a745;
            color: white;
            border-color: #28a745;
        }
        .option.incorrect {
            background: #dc3545;
            color: white;
            border-color: #dc3545;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: #4facfe;
            color: white;
        }
        .btn-primary:hover {
            background: #3d9bf5;
            transform: translateY(-2px);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .result-screen {
            display: none;
            text-align: center;
            padding: 60px 40px;
        }
        .final-score {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
        }
        .result-message {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
        @media (max-width: 480px) {
            .quiz-container {
                margin: 10px;
            }
            
            .question {
                font-size: 20px;
            }
            
            .quiz-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="quiz-container">
        <div class="header">
            <div class="score-board">
                <div>Score: <span id="current-score">0</span>/<span id="total-questions">5</span></div>
                <div>Question <span id="current-question">1</span></div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>
        
        <div class="quiz-content" id="quiz-content">
            <div class="question-number" id="question-number">Question 1</div>
            <div class="question" id="question-text">Loading...</div>
            <div class="options" id="options"></div>
            <div class="controls">
                <button class="btn btn-secondary" id="prev-btn" style="display: none;">Previous</button>
                <button class="btn btn-primary" id="next-btn">Next</button>
            </div>
        </div>

        <div class="result-screen" id="result-screen">
            <h2>Quiz Complete!</h2>
            <div class="final-score" id="final-score">0/5</div>
            <div class="result-message" id="result-message"></div>
            <button class="btn btn-primary" id="restart-btn">Restart Quiz</button>
        </div>
    </div>

    <script>
        const quizData = [
            {
                question: "What is the capital of France?",
                options: ["Berlin", "Madrid", "Paris", "Lisbon"],
                correct: 2
            },
            {
                question: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                correct: 1
            },
            {
                question: "What is the largest mammal in the world?",
                options: ["Elephant", "Blue Whale", "Giraffe", "Hippopotamus"],
                correct: 1
            },
            {
                question: "Which element has the chemical symbol 'O'?",
                options: ["Gold", "Oxygen", "Osmium", "Oganesson"],
                correct: 1
            },
            {
                question: "Who wrote 'Romeo and Juliet'?",
                options: ["Charles Dickens", "William Shakespeare", "Mark Twain", "Jane Austen"],
                correct: 1
            }
        ];
        let currentQuestionIndex = 0;
        let score = 0;
        let answers = [];

        const elements = {
            currentScore: document.getElementById('current-score'),
            totalQuestions: document.getElementById('total-questions'),
            currentQuestion: document.getElementById('current-question'),
            questionNumber: document.getElementById('question-number'),
            questionText: document.getElementById('question-text'),
            options: document.getElementById('options'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            progressFill: document.getElementById('progress-fill'),
            quizContent: document.getElementById('quiz-content'),
            resultScreen: document.getElementById('result-screen'),
            finalScore: document.getElementById('final-score'),
            resultMessage: document.getElementById('result-message'),
            restartBtn: document.getElementById('restart-btn')
        };
        function init() {
            elements.totalQuestions.textContent = quizData.length;
            loadQuestion();
            updateScore();
            setupEventListeners();
        }
        function loadQuestion() {
            const q = quizData[currentQuestionIndex];
            const questionNum = currentQuestionIndex + 1;
            
            elements.questionNumber.textContent = `Question ${questionNum}`;
            elements.questionText.textContent = q.question;
            elements.currentQuestion.textContent = questionNum;
            
            renderOptions(q.options, q.correct);
            updateProgress();
            
            elements.prevBtn.style.display = currentQuestionIndex > 0 ? 'block' : 'none';
            elements.nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? 'Finish' : 'Next';
        }

        function renderOptions(options, correctIndex) {
            elements.options.innerHTML = '';
            
            options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.textContent = option;
                optionEl.dataset.index = index;
                
                if (answers[currentQuestionIndex] === index) {
                    optionEl.classList.add('selected');
                }
                
                optionEl.addEventListener('click', () => selectOption(index));
                elements.options.appendChild(optionEl);
            });
        }
        function selectOption(index) {
            answers[currentQuestionIndex] = index;
            
            if (index === quizData[currentQuestionIndex].correct) {
                score++;
            }
            updateScore();
            updateOptionsVisual();
        }
        function updateOptionsVisual() {
            document.querySelectorAll('.option').forEach((option, index) => {
                option.classList.remove('selected', 'correct', 'incorrect');
                
                if (answers[currentQuestionIndex] === index) {
                    option.classList.add('selected');
                }
            });
        }
        function updateScore() {
            elements.currentScore.textContent = score;
        }
        function updateProgress() {
            const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
            elements.progressFill.style.width = progress + '%';
        }
        function nextQuestion() {
            if (currentQuestionIndex < quizData.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showResults();
            }
        }
        function prevQuestion() {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }
        function showResults() {
            elements.quizContent.style.display = 'none';
            elements.resultScreen.style.display = 'block';
            
            const percentage = Math.round((score / quizData.length) * 100);
            elements.finalScore.textContent = `${score}/${quizData.length}`;
            
            let message = '';
            if (percentage >= 80) message = '🎉 Outstanding!';
            else if (percentage >= 60) message = '👍 Great job!';
            else if (percentage >= 40) message = '📚 Keep learning!';
            else message = '💪 Try again!';
            elements.resultMessage.textContent = `${message} You scored ${percentage}%`;
        }
        function restartQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            answers = [];
            elements.quizContent.style.display = 'block';
            elements.resultScreen.style.display = 'none';
            loadQuestion();
            updateScore();
        }
        function setupEventListeners() {
            elements.nextBtn.addEventListener('click', nextQuestion);
            elements.prevBtn.addEventListener('click', prevQuestion);
            elements.restartBtn.addEventListener('click', restartQuiz);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key >= '1' && e.key <= '4') {
                const index = parseInt(e.key) - 1;
                const options = document.querySelectorAll('.option');
                if (options[index]) {
                    options[index].click();
                }
            }
        });

        init();
    </script>
</body>
</html>
